<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <meta property="og:title" content="Piqabu — Download">
  <meta property="og:description" content="Get Piqabu on Android or join the public iPhone beta on TestFlight.">
  <title>Piqabu — Download</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background-color: #080808;
      color: #fff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .grid-bg {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
    }
    .grid-bg::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center,
        rgba(8,8,8,0.55) 0%, rgba(8,8,8,0.25) 50%, rgba(8,8,8,0) 100%);
      pointer-events: none;
    }
    .page {
      position: relative; z-index: 1;
      min-height: 100dvh; min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 70px 28px 110px;
      text-align: center;
    }
    .logo-wrap { margin-bottom: 36px; opacity: 0; animation: fadeUp 1s ease forwards 0.2s; }
    .logo { width: clamp(80px, 11vw, 130px); height: auto; }

    .lead { opacity: 0; animation: fadeUp 1s ease forwards 0.5s; max-width: 480px; }
    .lead-title {
      font-size: clamp(20px, 3.4vw, 26px);
      font-weight: 300;
      color: rgba(255,255,255,0.92);
      letter-spacing: 0.01em;
      margin-bottom: 8px;
      line-height: 1.35;
    }
    .lead-sub {
      font-size: clamp(13px, 1.7vw, 15px);
      color: rgba(255,255,255,0.78);
      letter-spacing: 0.03em;
      line-height: 1.75;
      margin-bottom: 40px;
    }

    .dl-buttons { opacity: 0; animation: fadeUp 1s ease forwards 0.85s; width: 100%; max-width: 380px; }
    .dl-stack { display: flex; flex-direction: column; gap: 10px; }
    .dl-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 20px;
      border: 1px solid rgba(255,255,255,0.28);
      background: rgba(255,255,255,0.03);
      color: #fff;
      text-decoration: none;
      transition: border-color 0.22s ease, background 0.22s ease, color 0.22s ease;
    }
    .dl-btn.primary {
      background: #fff;
      color: #080808;
      border-color: transparent;
    }
    .dl-btn:hover {
      border-color: rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.08);
      color: #fff;
    }
    .dl-btn.primary:hover {
      background: #fff;
      color: #080808;
      opacity: 0.92;
    }
    .dl-btn-inner { display: flex; flex-direction: column; align-items: flex-start; gap: 3px; }
    .dl-name {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.02em;
    }
    .dl-ext {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(8,8,8,0.65);
    }
    .dl-btn:not(.primary) .dl-ext { color: rgba(255,255,255,0.6); }
    .dl-arrow { font-size: 14px; flex-shrink: 0; }

    .dl-note {
      opacity: 0; animation: fadeIn 1s ease forwards 1.15s;
      margin-top: 22px;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.58);
      line-height: 1.75;
      max-width: 380px;
    }

    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: flex; justify-content: space-between;
      padding: 18px 24px;
      padding-bottom: max(18px, env(safe-area-inset-bottom, 18px));
      z-index: 2;
      opacity: 0; animation: fadeIn 1.2s ease forwards 1.4s;
    }
    .b-item {
      font-size: 9px; font-weight: 400; letter-spacing: 0.14em;
      text-transform: uppercase; color: rgba(255,255,255,0.22);
    }
    .b-item a { color: inherit; text-decoration: none; transition: color 0.2s; }
    .b-item a:hover { color: rgba(255,255,255,0.55); }

    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="grid-bg" aria-hidden="true"></div>

  <main class="page">

    <div class="logo-wrap">
      <img class="logo" src="/assets/piqabu-logo.png" alt="Piqabu" loading="eager">
    </div>

    <div class="lead">
      <p class="lead-title" id="lead-title">Get Piqabu.</p>
      <p class="lead-sub" id="lead-sub">Install on your phone. Open the room.</p>
    </div>

    <div class="dl-buttons">
      <div class="dl-stack" id="dl-root">
        <!-- JS injects platform-appropriate buttons here -->
      </div>
      <p class="dl-note" id="dl-note">Direct .apk &nbsp;·&nbsp; Allow installs from this browser if prompted.</p>
    </div>

  </main>

  <footer class="bottom-bar" role="contentinfo">
    <span class="b-item"><a href="/">piqabu.live</a></span>
    <span class="b-item">Ahtohmoh</span>
  </footer>

  <script>
    (function () {
      const ANDROID_URL = "https://github.com/krasumashi/piqabu/releases/latest/download/piqabu.apk";
      const IOS_URL     = "https://testflight.apple.com/join/ZQjMEVCC";
      const SIDESTORE_URL = "/iphone#sidestore";

      function detectPlatform() {
        const ua = (navigator.userAgent || "").toLowerCase();
        if (/iphone|ipad|ipod/.test(ua)) return "ios";
        if (/android/.test(ua))           return "android";
        return "other";
      }

      const root  = document.getElementById("dl-root");
      const note  = document.getElementById("dl-note");
      const lead  = document.getElementById("lead-sub");
      const plat  = detectPlatform();

      const androidBtn = `
        <a class="dl-btn primary" href="${ANDROID_URL}" rel="noopener" download>
          <div class="dl-btn-inner">
            <span class="dl-name">Download for Android</span>
            <span class="dl-ext">APK &nbsp;·&nbsp; Direct install</span>
          </div>
          <span class="dl-arrow">↓</span>
        </a>`;

      const iosBtn = `
        <a class="dl-btn primary" href="${IOS_URL}" rel="noopener">
          <div class="dl-btn-inner">
            <span class="dl-name">Join the iPhone beta</span>
            <span class="dl-ext">TestFlight &nbsp;·&nbsp; Public link</span>
          </div>
          <span class="dl-arrow">→</span>
        </a>`;

      const iosSecondary = `
        <a class="dl-btn" href="${IOS_URL}" rel="noopener">
          <div class="dl-btn-inner">
            <span class="dl-name">For iPhone</span>
            <span class="dl-ext">TestFlight &nbsp;·&nbsp; Public beta</span>
          </div>
          <span class="dl-arrow">→</span>
        </a>`;

      const sideStoreSecondary = `
        <a class="dl-btn" href="${SIDESTORE_URL}">
          <div class="dl-btn-inner">
            <span class="dl-name">SideStore alternative</span>
            <span class="dl-ext">Manual iPhone install</span>
          </div>
          <span class="dl-arrow">→</span>
        </a>`;

      const androidSecondary = `
        <a class="dl-btn" href="${ANDROID_URL}" rel="noopener" download>
          <div class="dl-btn-inner">
            <span class="dl-name">For Android</span>
            <span class="dl-ext">APK &nbsp;·&nbsp; Direct install</span>
          </div>
          <span class="dl-arrow">↓</span>
        </a>`;

      if (plat === "android") {
        root.innerHTML = androidBtn + iosSecondary + sideStoreSecondary;
        note.textContent = "Allow installs from this browser if prompted.";
      } else if (plat === "ios") {
        root.innerHTML = iosBtn + sideStoreSecondary + androidSecondary;
        note.textContent = "TestFlight is the recommended iPhone install. SideStore remains available.";
        lead.textContent = "The public beta is ready on TestFlight.";
      } else {
        root.innerHTML = androidSecondary + iosSecondary + sideStoreSecondary;
        note.textContent = "Send the link to your phone, or scan from there.";
        lead.textContent = "Pick your platform.";
      }
    })();
  </script>

</body>
</html>
