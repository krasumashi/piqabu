<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <meta property="og:title" content="Piqabu Pro — Upgrade">
  <meta property="og:description" content="Upgrade to Piqabu Pro inside the app.">
  <title>Piqabu Pro — Upgrade</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background-color: #080808;
      color: #fff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .grid-bg {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
    }
    .grid-bg::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center,
        rgba(8,8,8,0.55) 0%, rgba(8,8,8,0.25) 50%, rgba(8,8,8,0) 100%);
      pointer-events: none;
    }
    .page {
      position: relative; z-index: 1;
      min-height: 100dvh; min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 70px 28px 110px;
      text-align: center;
    }
    .logo-wrap { margin-bottom: 36px; opacity: 0; animation: fadeUp 1s ease forwards 0.2s; }
    .logo { width: clamp(80px, 11vw, 130px); height: auto; }

    .lead { opacity: 0; animation: fadeUp 1s ease forwards 0.5s; max-width: 460px; }
    .lead-title {
      font-size: clamp(22px, 3.6vw, 28px);
      font-weight: 300;
      color: rgba(255,255,255,0.92);
      letter-spacing: 0.01em;
      margin-bottom: 10px;
      line-height: 1.35;
    }
    .lead-sub {
      font-size: clamp(13px, 1.7vw, 15px);
      color: rgba(255,255,255,0.8);
      letter-spacing: 0.03em;
      line-height: 1.8;
      margin-bottom: 36px;
    }

    .price-row {
      opacity: 0; animation: fadeUp 1s ease forwards 0.85s;
      display: flex; align-items: baseline; justify-content: center;
      gap: 10px; margin-bottom: 38px;
    }
    .price {
      font-size: clamp(28px, 5vw, 38px);
      font-weight: 300;
      color: #fff;
      letter-spacing: 0.01em;
    }
    .price-unit {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.62);
    }

    .cta-wrap { opacity: 0; animation: fadeUp 1s ease forwards 1.1s; }
    .cta {
      display: inline-block;
      padding: 15px 36px;
      background: rgba(255,255,255,0.88);
      color: #080808;
      text-decoration: none;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      transition: background 0.2s;
    }
    .cta:hover { background: #fff; }

    .footnote {
      opacity: 0; animation: fadeIn 1s ease forwards 1.4s;
      margin-top: 28px;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.58);
      max-width: 400px;
      line-height: 1.8;
    }

    .back-link {
      opacity: 0; animation: fadeIn 1s ease forwards 1.6s;
      margin-top: 40px;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.22);
      padding: 6px 2px;
      transition: color 0.25s ease, border-color 0.25s ease;
    }
    .back-link:hover {
      color: #fff;
      border-bottom-color: rgba(255,255,255,0.6);
    }

    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: flex; justify-content: space-between;
      padding: 18px 24px;
      padding-bottom: max(18px, env(safe-area-inset-bottom, 18px));
      z-index: 2;
      opacity: 0; animation: fadeIn 1.2s ease forwards 1.8s;
    }
    .b-item {
      font-size: 9px; font-weight: 400; letter-spacing: 0.14em;
      text-transform: uppercase; color: rgba(255,255,255,0.22);
    }

    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="grid-bg" aria-hidden="true"></div>

  <main class="page">

    <div class="logo-wrap">
      <img class="logo" src="/assets/piqabu-logo.png" alt="Piqabu" loading="eager">
    </div>

    <div class="lead">
      <p class="lead-title">Upgrade to Piqabu Pro.</p>
      <p class="lead-sub">Pro unlocks inside the app.<br>Install Piqabu first, then upgrade from Settings.</p>
    </div>

    <div class="price-row">
      <span class="price">₵300</span>
      <span class="price-unit">/ year</span>
    </div>

    <div class="cta-wrap">
      <a class="cta" href="/download">Get Piqabu &nbsp;→</a>
    </div>

    <p class="footnote">Payment is handled by Paystack inside the app.<br>One year. One device. Renewable.</p>

    <a class="back-link" href="/">← Back to Piqabu</a>

  </main>

  <footer class="bottom-bar" role="contentinfo">
    <span class="b-item">piqabu.live</span>
    <span class="b-item">Ahtohmoh</span>
  </footer>

</body>
</html>
