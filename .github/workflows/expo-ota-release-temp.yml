name: Release migration OTA

on:
  push:
    branches:
      - agent/cloudflare-turn-ota

permissions:
  contents: read

concurrency:
  group: piqabu-migration-ota
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        channel:
          - preview
          - production
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout release revision
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Publish OTA update
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: npx eas-cli update --branch "${{ matrix.channel }}" --message "Vultr endpoint and Cloudflare TURN migration" --non-interactive
